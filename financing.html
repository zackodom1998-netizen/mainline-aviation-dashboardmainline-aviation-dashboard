<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Financing - Virgin Atlantic | Mainline Aviation</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e1a;color:#e8eef5;padding:24px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:24px;}
.kpi{background:#131826;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 20px;}
.kpi .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:6px;}
.kpi .value{font-size:22px;font-weight:700;color:#e8eef5;margin-bottom:4px;}
.kpi .delta{font-size:12px;color:#64748b;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#475569;margin:24px 0 12px;}
.card{background:#131826;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:20px;margin-bottom:16px;}
h3{font-size:14px;font-weight:600;color:#94a3b8;margin-bottom:16px;}
.chart-wrap{height:240px;position:relative;}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.filters label{font-size:12px;color:#64748b;font-weight:500;}
.filters select{background:#0f1623;border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#e8eef5;padding:5px 10px;font-size:12px;outline:none;}
.info{font-size:12px;color:#64748b;margin-left:auto;}
.tbl-wrap{border-radius:10px;border:1px solid rgba(255,255,255,0.07);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{padding:10px 14px;font-weight:600;color:#64748b;border-bottom:1px solid rgba(255,255,255,0.08);text-align:left;background:#131826;}
thead th.r{text-align:right;}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.05);}
tbody tr:hover{background:rgba(255,255,255,0.025);}
tbody td{padding:10px 14px;vertical-align:middle;}
tbody td.r{text-align:right;}tbody td.dim{color:#64748b;font-size:12px;}
tfoot td{padding:10px 14px;font-weight:700;background:rgba(255,255,255,0.04);border-top:2px solid rgba(255,255,255,0.1);}
tfoot td.r{text-align:right;color:#60a5fa;}
.badge{display:inline-block;font-family:monospace;background:rgba(96,165,250,0.15);color:#60a5fa;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;}
.badge.v110{background:rgba(52,211,153,0.15);color:#34d399;}
.green{color:#34d399;font-weight:600;}
.leads{display:flex;flex-wrap:wrap;gap:5px;}
.chip{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:3px 10px;font-size:12px;color:#cbd5e1;}
</style>
</head>
<body>
<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;padding:16px 20px;background:#fff;border-radius:10px;"><img src="va-logo.svg" alt="Virgin Atlantic" style="height:60px;width:auto;display:block;"/><div style="border-left:1px solid #eee;padding-left:16px;"><div style="font-size:11px;font-weight:600;color:#3B0E5E;text-transform:uppercase;letter-spacing:0.1em;">Supplier Invoice Report</div><div style="font-size:13px;color:#666;margin-top:2px;">May 2026 &middot; ATL Hub</div></div></div><div class="kpis" id="kpis"></div>
<div class="section-title">Daily Food Cost - May 2026</div>
<div class="card"><h3>Total Food Cost by Flight (USD)</h3><div class="chart-wrap"><canvas id="chart"></canvas></div></div>
<div class="section-title">Virgin Atlantic - Cost Breakdown (All 20 Flights)</div>
<div class="filters">
  <label>Flight:</label>
  <select id="fF" onchange="render()"><option value="">All</option><option value="104">V104 - ATL to LHR</option><option value="110">V110 - ATL to MAN</option></select>
  <label>Date:</label>
  <select id="fD" onchange="render()"><option value="">All Dates</option></select>
  <span class="info" id="info"></span>
</div>
<div class="tbl-wrap"><table>
  <thead><tr><th>Date</th><th>Flight</th><th>Airline</th><th>Route</th><th>Team Lead(s)</th><th class="r">Food Cost</th></tr></thead>
  <tbody id="tbody"></tbody>
  <tfoot><tr><td colspan="5">Total</td><td class="r" id="ft"></td></tr></tfoot>
</table></div>
<script>
var raw=[["2026-05-01","104","ATL-LHR",8549.55,["Bobbie Jackson III","Gabriel Silva Mane"]],
  ["2026-05-01","110","ATL-MAN",6097.81,["Maurice Smith","Christian Lawson"]],
  ["2026-05-02","104","ATL-LHR",7696.54,["Abubakarr Sessay","Christian Lawson"]],
  ["2026-05-02","110","ATL-MAN",5747.35,["Bobbie Jackson III","Maurice Smith"]],
  ["2026-05-03","104","ATL-LHR",8390.95,["Bobbie Jackson III","Claudette St. Juste"]],
  ["2026-05-03","110","ATL-MAN",6279.28,["Gabriel Silva Mane"]],
  ["2026-05-04","104","ATL-LHR",8300.94,["Claudette St. Juste","Abubakarr Sessay"]],
  ["2026-05-04","110","ATL-MAN",6396.47,["Bobbie Jackson III","Issa Camara"]],
  ["2026-05-05","104","ATL-LHR",7652.39,["Claudette St. Juste","Abubakarr Sessay"]],
  ["2026-05-05","110","ATL-MAN",6132.13,["Christian Lawson"]],
  ["2026-05-06","104","ATL-LHR",7356.35,["Christian Lawson","Tecari Brown"]],
  ["2026-05-06","110","ATL-MAN",5658.77,["Claudette St. Juste","Abdou Diakhate"]],
  ["2026-05-07","104","ATL-LHR",7721.96,["Christian Lawson","Abdou Diakhate"]],
  ["2026-05-07","110","ATL-MAN",5991.99,["Bobbie Jackson III","Abdou Diakhate"]],
  ["2026-05-08","104","ATL-LHR",8131.25,["Gabriel Silva Mane","Maurice Smith"]],
  ["2026-05-08","110","ATL-MAN",6033.51,["Christian Lawson","Bobbie Jackson III"]],
  ["2026-05-09","104","ATL-LHR",8219.44,["Maurice Smith","Gabriel Silva Mane"]],
  ["2026-05-09","110","ATL-MAN",6430.59,["Christian Lawson","Bobbie Jackson III"]],
  ["2026-05-10","104","ATL-LHR",8233.1,["Gabriel Silva Mane","Rachel Lester"]],
  ["2026-05-10","110","ATL-MAN",6047.14,["Claudette St. Juste","Maurice Smith"]]];
function fmt(n){return "$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(s){return new Date(s+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
var data=raw.map(function(r){return{date:r[0],ob:r[1],route:r[2],cost:r[3],leads:r[4]};});
var dates=[...new Set(data.map(function(r){return r.date;}))].sort();
dates.forEach(function(d){var o=document.createElement("option");o.value=d;o.textContent=fd(d);document.getElementById("fD").appendChild(o);});
var gt=data.reduce(function(s,r){return s+r.cost;},0);
var v104t=data.filter(function(r){return r.ob==="104";}).reduce(function(s,r){return s+r.cost;},0);
var v110t=data.filter(function(r){return r.ob==="110";}).reduce(function(s,r){return s+r.cost;},0);
var allLeads=new Set();data.forEach(function(r){r.leads.forEach(function(l){allLeads.add(l);});});
document.getElementById("kpis").innerHTML="<div class='kpi'><div class='label'>Total Food Cost</div><div class='value'>"+fmt(gt)+"</div><div class='delta'>May 1-10 V104 + V110</div></div><div class='kpi'><div class='label'>V104 Total</div><div class='value'>"+fmt(v104t)+"</div><div class='delta'>ATL to LHR - 10 flights</div></div><div class='kpi'><div class='label'>V110 Total</div><div class='value'>"+fmt(v110t)+"</div><div class='delta'>ATL to MAN - 10 flights</div></div><div class='kpi'><div class='label'>Team Leads</div><div class='value'>"+allLeads.size+"</div><div class='delta'>Virgin Atlantic - All 20 matched</div></div>";
new Chart(document.getElementById("chart"),{type:"bar",data:{labels:dates.map(function(d){return fd(d).replace(", 2026","");}),datasets:[{label:"V104 ATL-LHR",data:dates.map(function(d){return(data.find(function(r){return r.date===d&&r.ob==="104";})||{cost:0}).cost;}),backgroundColor:"rgba(96,165,250,0.75)",borderRadius:4},{label:"V110 ATL-MAN",data:dates.map(function(d){return(data.find(function(r){return r.date===d&&r.ob==="110";})||{cost:0}).cost;}),backgroundColor:"rgba(52,211,153,0.75)",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#94a3b8"}},tooltip:{callbacks:{label:function(c){return c.dataset.label+": "+fmt(c.raw);}}}},scales:{x:{ticks:{color:"#64748b"},grid:{color:"rgba(255,255,255,0.05)"}},y:{ticks:{color:"#64748b",callback:function(v){return "$"+v.toLocaleString();}},grid:{color:"rgba(255,255,255,0.05)"}}}}});
function render(){
  var flt=document.getElementById("fF").value,fdt=document.getElementById("fD").value;
  var rows=data.filter(function(r){return(!flt||r.ob===flt)&&(!fdt||r.date===fdt);});
  var h2="",tc=0;
  rows.forEach(function(r){
    var bc=r.ob==="110"?"v110":"";tc+=r.cost;
    var lh=r.leads.map(function(l){return "<span class='chip'>"+l+"</span>";}).join("");
    h2+="<tr><td>"+fd(r.date)+"</td><td><span class='badge "+bc+"'>V"+r.ob+"</span></td><td><img src='va-logo.svg' alt='Virgin Atlantic' style='height:28px;width:auto;background:#fff;border-radius:4px;padding:2px 6px;'/></td><td class='dim'>"+r.route+"</td><td><div class='leads'>"+lh+"</div></td><td class='r green'>"+fmt(r.cost)+"</td></tr>";
  });
  document.getElementById("tbody").innerHTML=h2;
  document.getElementById("info").textContent=rows.length+" rows";
  document.getElementById("ft").textContent=fmt(tc);
}
render();
</script>
</body>
</html>
