.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}

.count{font-size:12px;color:#64748b;margin-left:auto;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{padding:9px 12px;font-weight:600;color:#64748b;border-bottom:1px solid rgba(255,255,255,0.07);text-align:left;position:sticky;top:0;background:#131826;}
thead th.r{text-align:right;}
thead th.c{text-align:center;}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.035);}
tbody tr:hover{background:rgba(255,255,255,0.03);}
tbody td{padding:8px 12px;}
tbody td.r{text-align:right;}
tbody td.c{text-align:center;color:#94a3b8;}
tbody td.m{color:#94a3b8;font-size:12px;}
tfoot tr{background:rgba(255,255,255,0.05);border-top:2px solid rgba(255,255,255,0.1);}
tfoot td{padding:9px 12px;font-weight:700;}
tfoot td.r{text-align:right;color:#60a5fa;}
tfoot td.c{text-align:center;color:#94a3b8;}
.badge{font-family:monospace;background:rgba(96,165,250,0.15);color:#60a5fa;padding:1px 7px;border-radius:4px;font-size:11px;font-weight:700;}
.green{color:#34d399;font-weight:600;}

  var k=r[0]+"|"+r[1];
  var dayCost = (fc[r[0]]||{})[r[1]]||0;
  var total = mCount[k]||1;
  return { date:r[0], outbound:r[1], lead:r[2], asset:r[3], type:r[4], cpm: dayCost/total, dayCost: dayCost, totalM: total };
});

// Populate filter dropdowns
var dates = [...new Set(data.map(function(r){return r.date;}))].sort();
var leads = [...new Set(data.map(function(r){return r.lead;}))].sort();
var fDate = document.getElementById("fDate");
var fLead = document.getElementById("fLead");
dates.forEach(function(d){ var o=document.createElement("option"); o.value=d; o.textContent=fdate(d); fDate.appendChild(o); });
leads.forEach(function(l){ var o=document.createElement("option"); o.value=l; o.textContent=l; fLead.appendChild(o); });

// KPIs
var totalCost = Object.keys(fc).reduce(function(s,d){ return s+(fc[d]["104"]||0)+(fc[d]["110"]||0); },0);
var avgCpm = totalCost / data.length;
document.getElementById("kpis").innerHTML =
  "<div class='kpi'><div class='label'>Total Food Cost</div><div class='value'>"+fmt(totalCost)+"</div><div class='delta'>May 1-10 - V104 + V110</div></div>"+
  "<div class='kpi'><div class='label'>Total Missions</div><div class='value'>"+data.length+"</div><div class='delta'>Outbound 104 and 110</div></div>"+
  "<div class='kpi'><div class='label'>Avg Cost per Mission</div><div class='value'>"+fmt(avgCpm)+"</div><div class='delta'>across all dates</div></div>"+
  "<div class='kpi'><div class='label'>V104 Missions</div><div class='value'>"+data.filter(function(r){return r.outbound==="104";}).length+"</div><div class='delta'>ATL-LHR</div></div>";

// Chart
var chartDates = Object.keys(fc).sort();
new Chart(document.getElementById("chart"),{type:"bar",data:{labels:chartDates.map(function(d){return fdate(d).replace(", 2026","");}),datasets:[{label:"V104 ATL-LHR",data:chartDates.map(function(d){return fc[d]["104"]||0;}),backgroundColor:"rgba(96,165,250,0.75)",borderRadius:4},{label:"V110 ATL-MAN",data:chartDates.map(function(d){return fc[d]["110"]||0;}),backgroundColor:"rgba(52,211,153,0.75)",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#94a3b8"}},tooltip:{callbacks:{label:function(c){return c.dataset.label+": "+fmt(c.raw);}}}},scales:{x:{ticks:{color:"#64748b"},grid:{color:"rgba(255,255,255,0.05)"}},y:{ticks:{color:"#64748b",callback:function(v){return "$"+v.toLocaleString();}},grid:{color:"rgba(255,255,255,0.05)"}}}}});

function renderTable(){
  var flt = document.getElementById("fFlight").value;
  var fdt = document.getElementById("fDate").value;
  var fld = document.getElementById("fLead").value;
  var filtered = data.filter(function(r){
    return (!flt||r.outbound===flt) && (!fdt||r.date===fdt) && (!fld||r.lead===fld);
  });
  var rows = "";
  var totCost = 0;
  filtered.forEach(function(r){
    totCost += r.cpm;
    rows += "<tr>";
    rows += "<td>"+fdate(r.date)+"</td>";
    rows += "<td><span class='badge'>V"+r.outbound+"</span></td>";
    rows += "<td>"+r.lead+"</td>";
    rows += "<td class='c m'>"+r.asset+"</td>";
    rows += "<td class='c m'>"+r.type+"</td>";
    rows += "<td class='r green'>"+fmt(r.cpm)+"</td>";
    rows += "</tr>";
  });
  document.getElementById("tbody").innerHTML = rows;
  document.getElementById("rowCount").textContent = filtered.length + " missions";
  document.getElementById("ftotm").textContent = filtered.length;
  document.getElementById("ftotc").textContent = fmt(totCost);
}

renderTable();
</script>
</body>
</html>
