*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e1a;color:#e8eef5;padding:24px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
.kpi{background:#131826;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 20px;}
.kpi .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:6px;}
.kpi .value{font-size:22px;font-weight:700;color:#e8eef5;margin-bottom:4px;}
.kpi .delta{font-size:12px;color:#64748b;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#475569;margin:24px 0 12px;}
.card{background:#131826;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:20px;margin-bottom:16px;}
h3{font-size:14px;font-weight:600;color:#94a3b8;margin-bottom:16px;}
.chart-wrap{height:260px;position:relative;}
.tabs{display:flex;gap:8px;margin-bottom:16px;}
.stab{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;color:#94a3b8;cursor:pointer;}
.stab.active{background:rgba(96,165,250,0.15);border-color:#60a5fa;color:#60a5fa;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{padding:10px 14px;font-weight:600;color:#64748b;border-bottom:1px solid rgba(255,255,255,0.07);text-align:left;cursor:pointer;user-select:none;}
thead th:hover{color:#94a3b8;}
thead th.r{text-align:right;}
thead th.c{text-align:center;}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);}
tbody tr:hover{background:rgba(255,255,255,0.03);}
tbody td{padding:9px 14px;color:#e8eef5;}
tbody td.r{text-align:right;}
tbody td.c{text-align:center;color:#94a3b8;}
tbody td.m{color:#94a3b8;}
tfoot tr{background:rgba(255,255,255,0.05);border-top:2px solid rgba(255,255,255,0.1);}
tfoot td{padding:10px 14px;font-weight:700;}
tfoot td.r{text-align:right;color:#60a5fa;}
tfoot td.c{text-align:center;color:#94a3b8;}
.badge{font-family:monospace;background:rgba(96,165,250,0.15);color:#60a5fa;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700;}
.green{color:#34d399;}
.bar-wrap{background:rgba(255,255,255,0.05);border-radius:3px;height:6px;margin-top:4px;}
.bar-fill{background:#60a5fa;border-radius:3px;height:6px;}
</style>
</head>

function fmt(n){return "$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fdate(s){return new Date(s+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

// Build cost-per-mission lookup: {date+outbound -> cost_per_mission}
var fcMap = {};
fc.forEach(function(r){ fcMap[r[0]+"|"+r[1]] = {cost:r[3], route:r[2]}; });

// Total missions per date+outbound
var totalMissionsMap = {};
md.forEach(function(r){
  var k = r[0]+"|"+r[1];
  totalMissionsMap[k] = (totalMissionsMap[k]||0) + r[3];
});

// Build enriched rows: each lead entry + their share of food cost
var enriched = md.map(function(r){
  var k = r[0]+"|"+r[1];
  var fc_entry = fcMap[k] || {cost:0, route:"?"};
  var totalM = totalMissionsMap[k] || 1;
  var cpm = fc_entry.cost / totalM;
  return {
    date: r[0], outbound: r[1], flight: "V"+r[1], route: fc_entry.route,
    lead: r[2], missions: r[3],
    totalCost: fc_entry.cost, cpm: cpm,
    leadCost: cpm * r[3]
  };
});

// KPI totals
var grandCost=0, grandMissions=0, leads={};
enriched.forEach(function(r){
  grandCost += r.leadCost;
  grandMissions += r.missions;
  if(!leads[r.lead]) leads[r.lead] = {missions:0, cost:0};
  leads[r.lead].missions += r.missions;
  leads[r.lead].cost += r.leadCost;
});
var topLead = Object.keys(leads).sort(function(a,b){return leads[b].missions-leads[a].missions;})[0];

document.getElementById("kpis").innerHTML =
  "<div class='kpi'><div class='label'>Total Food Cost</div><div class='value'>"+fmt(grandCost)+"</div><div class='delta'>May 1-10 - V104 + V110</div></div>"+
  "<div class='kpi'><div class='label'>Total Missions</div><div class='value'>"+grandMissions+"</div><div class='delta'>Outbound 104 and 110</div></div>"+
  "<div class='kpi'><div class='label'>Avg Cost per Mission</div><div class='value'>"+fmt(grandCost/grandMissions)+"</div><div class='delta'>across all leads</div></div>"+
  "<div class='kpi'><div class='label'>Top Lead by Volume</div><div class='value'>"+topLead.split(" ")[0]+"</div><div class='delta'>"+leads[topLead].missions+" missions</div></div>";

// Chart
var chartDates={};
fc.forEach(function(r){
  if(!chartDates[r[0]]) chartDates[r[0]]={v104:0,v110:0};
  if(r[1]==="104") chartDates[r[0]].v104=r[3]; else chartDates[r[0]].v110=r[3];
});
var dates=Object.keys(chartDates).sort();
new Chart(document.getElementById("chart"),{type:"bar",data:{labels:dates.map(function(d){return fdate(d).replace(", 2026","");}),datasets:[{label:"V104 ATL-LHR",data:dates.map(function(d){return chartDates[d].v104;}),backgroundColor:"rgba(96,165,250,0.75)",borderRadius:4},{label:"V110 ATL-MAN",data:dates.map(function(d){return chartDates[d].v110;}),backgroundColor:"rgba(52,211,153,0.75)",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#94a3b8"}},tooltip:{callbacks:{label:function(c){return c.dataset.label+": "+fmt(c.raw);}}}},scales:{x:{ticks:{color:"#64748b"},grid:{color:"rgba(255,255,255,0.05)"}},y:{ticks:{color:"#64748b",callback:function(v){return "$"+v.toLocaleString();}},grid:{color:"rgba(255,255,255,0.05)"}}}}});

var currentView = "lead";
function showView(v){
  currentView = v;
  ["lead","date","flight"].forEach(function(t){
    document.getElementById("tab-"+t).className = "stab"+(t===v?" active":"");
  });
  renderTable();
}

function renderTable(){
  var card = document.getElementById("table-card");
  var html2 = "<table><thead>";
  if(currentView==="lead"){
    // Group by lead
    var byLead = {};
    enriched.forEach(function(r){
      if(!byLead[r.lead]) byLead[r.lead]={missions:0,cost:0,flights:{}};
      byLead[r.lead].missions += r.missions;
      byLead[r.lead].cost += r.leadCost;
      byLead[r.lead].flights[r.flight]=(byLead[r.lead].flights[r.flight]||0)+r.missions;
    });
    var rows2 = Object.keys(byLead).sort(function(a,b){return byLead[b].missions-byLead[a].missions;});
    var maxM = Math.max.apply(null, rows2.map(function(l){return byLead[l].missions;}));
    html2 += "<tr><th>Team Lead</th><th class='c'>Flights</th><th class='c'>Missions</th><th class='r'>Food Cost Share</th><th class='r'>Avg Cost/Mission</th></tr></thead><tbody>";
    rows2.forEach(function(lead){
      var d = byLead[lead];
      var flightBadges = Object.keys(d.flights).map(function(f){return "<span class='badge'>"+f+"</span>";}).join(" ");
      var pct = Math.round(d.missions/maxM*100);
      html2 += "<tr><td><strong>"+lead+"</strong><div class='bar-wrap'><div class='bar-fill' style='width:"+pct+"%;'></div></div></td>";
      html2 += "<td class='c'>"+flightBadges+"</td>";
      html2 += "<td class='c'>"+d.missions+"</td>";
      html2 += "<td class='r'>"+fmt(d.cost)+"</td>";
      html2 += "<td class='r green'>"+fmt(d.cost/d.missions)+"</td></tr>";
    });
    html2 += "</tbody><tfoot><tr><td colspan='2'><strong>Total</strong></td><td class='c'>"+grandMissions+"</td><td class='r'>"+fmt(grandCost)+"</td><td class='r green'>"+fmt(grandCost/grandMissions)+"</td></tr></tfoot>";
  } else if(currentView==="date"){
    html2 += "<tr><th>Date</th><th>Flight</th><th class='c'>Leads</th><th class='c'>Missions</th><th class='r'>Food Cost</th><th class='r'>Cost/Mission</th></tr></thead><tbody>";
    var byDate = {};
    enriched.forEach(function(r){
      var k=r.date+"|"+r.flight;
      if(!byDate[k]) byDate[k]={date:r.date,flight:r.flight,route:r.route,leads:new Set(),missions:0,cost:r.totalCost,cpm:r.cpm};
      byDate[k].leads.add(r.lead);
      byDate[k].missions+=r.missions;
    });
    Object.keys(byDate).sort().forEach(function(k){
      var d=byDate[k];
      html2 += "<tr><td>"+fdate(d.date)+"</td><td><span class='badge'>"+d.flight+"</span> <span class='m'>"+d.route+"</span></td>";
      html2 += "<td class='c'>"+d.leads.size+"</td><td class='c'>"+d.missions+"</td>";
      html2 += "<td class='r'>"+fmt(d.cost)+"</td><td class='r green'>"+fmt(d.cpm)+"</td></tr>";
    });
    html2 += "</tbody>";
  } else {
    html2 += "<tr><th>Flight</th><th>Route</th><th class='c'>Missions</th><th class='r'>Total Cost</th><th class='r'>Cost/Mission</th></tr></thead><tbody>";
    var byFl = {};
    enriched.forEach(function(r){
      if(!byFl[r.flight]) byFl[r.flight]={route:r.route,missions:0,cost:0};
      byFl[r.flight].missions+=r.missions; byFl[r.flight].cost+=r.leadCost;
    });
    Object.keys(byFl).sort().forEach(function(f){
      var d=byFl[f];
      html2 += "<tr><td><span class='badge'>"+f+"</span></td><td class='m'>"+d.route+"</td>";
      html2 += "<td class='c'>"+d.missions+"</td><td class='r'>"+fmt(d.cost)+"</td><td class='r green'>"+fmt(d.cost/d.missions)+"</td></tr>";
    });
    html2 += "</tbody>";
  }
  html2 += "</table>";
  card.innerHTML = html2;
}

renderTable();
</script>
