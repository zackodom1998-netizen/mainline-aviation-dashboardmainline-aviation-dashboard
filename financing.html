<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Financing - Mainline Aviation</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e1a;color:#e8eef5;padding:24px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
.kpi{background:#131826;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 20px;}
.kpi .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:6px;}
.kpi .value{font-size:22px;font-weight:700;color:#e8eef5;margin-bottom:4px;}
.kpi .delta{font-size:12px;color:#64748b;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#475569;margin:24px 0 12px;}
.card{background:#131826;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:20px;margin-bottom:16px;}
h3{font-size:14px;font-weight:600;color:#94a3b8;margin-bottom:16px;}
.chart-wrap{height:260px;position:relative;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{padding:10px 14px;font-weight:600;color:#64748b;border-bottom:1px solid rgba(255,255,255,0.07);text-align:left;}
thead th.r{text-align:right;}
thead th.c{text-align:center;}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);}
tbody tr:hover{background:rgba(255,255,255,0.03);}
tbody td{padding:9px 14px;color:#e8eef5;}
tbody td.r{text-align:right;}
tbody td.c{text-align:center;color:#94a3b8;}
tbody td.m{color:#94a3b8;}
tfoot tr{background:rgba(255,255,255,0.05);border-top:2px solid rgba(255,255,255,0.1);}
tfoot td{padding:10px 14px;font-weight:700;}
tfoot td.r{text-align:right;color:#60a5fa;}
tfoot td.c{text-align:center;color:#94a3b8;}
.badge{font-family:monospace;background:rgba(96,165,250,0.15);color:#60a5fa;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700;}
.green{color:#34d399;}
</style>
</head>
<body>
<div class="kpis" id="kpis"></div>
<div class="section-title">Daily Food Cost - May 2026</div>
<div class="card">
  <h3>Food Cost by Flight (USD)</h3>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
</div>
<div class="section-title">Cost Breakdown by Mission</div>
<div class="card" style="padding:0;overflow:hidden;">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Flight</th>
        <th>Route</th>
        <th class="r">Food Cost</th>
        <th class="c">Missions</th>
        <th class="r">Cost / Mission</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
    <tfoot>
      <tr>
        <td colspan="3">Total - May 1 to 10, 2026</td>
        <td class="r" id="ftotal"></td>
        <td class="c" id="fmissions"></td>
        <td class="r" id="favg"></td>
      </tr>
    </tfoot>
  </table>
</div>
<script>
var data = [
  ["2026-05-01","V104","104","ATL-LHR",8549.55,4],
  ["2026-05-01","V110","110","ATL-MAN",6097.81,4],
  ["2026-05-02","V104","104","ATL-LHR",7696.54,4],
  ["2026-05-02","V110","110","ATL-MAN",5747.35,4],
  ["2026-05-03","V104","104","ATL-LHR",8390.95,4],
  ["2026-05-03","V110","110","ATL-MAN",6279.28,2],
  ["2026-05-04","V104","104","ATL-LHR",8300.94,4],
  ["2026-05-04","V110","110","ATL-MAN",6396.47,4],
  ["2026-05-05","V104","104","ATL-LHR",7652.39,4],
  ["2026-05-05","V110","110","ATL-MAN",6132.13,2],
  ["2026-05-06","V104","104","ATL-LHR",7356.35,4],
  ["2026-05-06","V110","110","ATL-MAN",5658.77,2],
  ["2026-05-07","V104","104","ATL-LHR",7721.96,4],
  ["2026-05-07","V110","110","ATL-MAN",5991.99,4],
  ["2026-05-08","V104","104","ATL-LHR",8131.25,4],
  ["2026-05-08","V110","110","ATL-MAN",6033.51,4],
  ["2026-05-09","V104","104","ATL-LHR",8219.44,4],
  ["2026-05-09","V110","110","ATL-MAN",6430.59,4],
  ["2026-05-10","V104","104","ATL-LHR",8233.10,4],
  ["2026-05-10","V110","110","ATL-MAN",6047.14,4]
];

function fmt(n) {
  return "$" + n.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fdate(s) {
  return new Date(s + "T12:00:00").toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
}

var gt=0, t104=0, t110=0, tm=0;
var chartDates={}, tbody=document.getElementById("tbody"), rows="";

data.forEach(function(row) {
  var date=row[0], vfn=row[1], outbound=row[2], route=row[3], cost=row[4], missions=row[5];
  var cpm = fmt(cost / missions);
  gt += cost;
  if (outbound === "104") t104 += cost; else t110 += cost;
  tm += missions;
  if (!chartDates[date]) chartDates[date] = {v104:0, v110:0};
  if (outbound === "104") chartDates[date].v104 = cost; else chartDates[date].v110 = cost;

  rows += "<tr>";
  rows += "<td>" + fdate(date) + "</td>";
  rows += "<td><span class='badge'>" + vfn + "</span></td>";
  rows += "<td class='m'>" + route + "</td>";
  rows += "<td class='r'>" + fmt(cost) + "</td>";
  rows += "<td class='c'>" + missions + "</td>";
  rows += "<td class='r green'>" + cpm + "</td>";
  rows += "</tr>";
});

tbody.innerHTML = rows;
document.getElementById("ftotal").textContent = fmt(gt);
document.getElementById("fmissions").textContent = tm;
document.getElementById("favg").textContent = fmt(gt / tm);

document.getElementById("kpis").innerHTML =
  "<div class='kpi'><div class='label'>Total Food Cost</div><div class='value'>" + fmt(gt) + "</div><div class='delta'>May 1-10, 2026</div></div>" +
  "<div class='kpi'><div class='label'>V104 ATL-LHR</div><div class='value'>" + fmt(t104) + "</div><div class='delta'>10 departures</div></div>" +
  "<div class='kpi'><div class='label'>V110 ATL-MAN</div><div class='value'>" + fmt(t110) + "</div><div class='delta'>10 departures</div></div>" +
  "<div class='kpi'><div class='label'>Avg Cost per Mission</div><div class='value'>" + fmt(gt/tm) + "</div><div class='delta'>" + tm + " missions</div></div>";

var dates = Object.keys(chartDates).sort();
var labels = dates.map(function(d) { return fdate(d).replace(", 2026",""); });
var v104data = dates.map(function(d) { return chartDates[d].v104; });
var v110data = dates.map(function(d) { return chartDates[d].v110; });

new Chart(document.getElementById("chart"), {
  type: "bar",
  data: {
    labels: labels,
    datasets: [
      {label: "V104 ATL-LHR", data: v104data, backgroundColor: "rgba(96,165,250,0.75)", borderRadius: 4},
      {label: "V110 ATL-MAN", data: v110data, backgroundColor: "rgba(52,211,153,0.75)", borderRadius: 4}
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {labels: {color: "#94a3b8"}},
      tooltip: {callbacks: {label: function(c) { return c.dataset.label + ": " + fmt(c.raw); }}}
    },
    scales: {
      x: {ticks: {color: "#64748b"}, grid: {color: "rgba(255,255,255,0.05)"}},
      y: {ticks: {color: "#64748b", callback: function(v) { return "$" + v.toLocaleString(); }}, grid: {color: "rgba(255,255,255,0.05)"}}
    }
  }
});
</script>
</body>
</html>
