<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Financing - Mainline Aviation</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e1a;color:#e8eef5;padding:24px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:24px;}
.kpi{background:#131826;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px 20px;}
.kpi .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:6px;}
.kpi .value{font-size:22px;font-weight:700;color:#e8eef5;margin-bottom:4px;}
.kpi .delta{font-size:12px;color:#64748b;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#475569;margin:24px 0 12px;}
.card{background:#131826;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:20px;margin-bottom:16px;}
h3{font-size:14px;font-weight:600;color:#94a3b8;margin-bottom:16px;}
.chart-wrap{height:240px;position:relative;}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.filters label{font-size:12px;color:#64748b;font-weight:500;}
.filters select{background:#0f1623;border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#e8eef5;padding:5px 10px;font-size:12px;outline:none;}
.info{font-size:12px;color:#64748b;margin-left:auto;}
.tbl-wrap{border-radius:10px;border:1px solid rgba(255,255,255,0.07);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{padding:10px 14px;font-weight:600;color:#64748b;border-bottom:1px solid rgba(255,255,255,0.08);text-align:left;background:#131826;}
thead th.r{text-align:right;}thead th.c{text-align:center;}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.05);}
tbody tr:hover{background:rgba(255,255,255,0.025);}
tbody td{padding:10px 14px;vertical-align:middle;}
tbody td.r{text-align:right;}tbody td.c{text-align:center;}tbody td.dim{color:#64748b;font-size:12px;}
tfoot td{padding:10px 14px;font-weight:700;background:rgba(255,255,255,0.04);border-top:2px solid rgba(255,255,255,0.1);}
tfoot td.r{text-align:right;color:#60a5fa;}tfoot td.c{text-align:center;color:#64748b;}
.badge{display:inline-block;font-family:monospace;background:rgba(96,165,250,0.15);color:#60a5fa;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;}
.badge.v110{background:rgba(52,211,153,0.15);color:#34d399;}
.cpm{color:#34d399;font-weight:600;}
.leads{display:flex;flex-wrap:wrap;gap:5px;}
.chip{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:3px 10px;font-size:12px;color:#cbd5e1;}
.mc{display:inline-block;background:rgba(255,255,255,0.07);border-radius:10px;padding:1px 8px;font-size:12px;color:#94a3b8;}
</style>
</head>
<body>
<div class="kpis" id="kpis"></div>
<div class="section-title">Daily Food Cost - May 2026</div>
<div class="card">
  <h3>Total Food Cost by Flight (USD)</h3>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
</div>
<div class="section-title">Food Cost per Mission</div>
<div class="filters">
  <label>Flight:</label>
  <select id="fF" onchange="render()"><option value="">All Flights</option><option value="104">V104 - ATL to LHR</option><option value="110">V110 - ATL to MAN</option></select>
  <label>Date:</label>
  <select id="fD" onchange="render()"><option value="">All Dates</option></select>
  <span class="info" id="info"></span>
</div>
<div class="tbl-wrap"><table>
  <thead><tr><th>Date</th><th>Flight</th><th>Aircraft</th><th>Team Lead(s)</th><th class="c">Missions</th><th class="r">Cost / Mission</th><th class="r">Total</th></tr></thead>
  <tbody id="tbody"></tbody>
  <tfoot><tr><td colspan="4">Total</td><td class="c" id="fm"></td><td class="r" id="fa"></td><td class="r" id="ft"></td></tr></tfoot>
</table></div>
<script>
var fc={"2026-05-01":{"104":8549.55,"110":6097.81},"2026-05-02":{"104":7696.54,"110":5747.35},"2026-05-03":{"104":8390.95,"110":6279.28},"2026-05-04":{"104":8300.94,"110":6396.47},"2026-05-05":{"104":7652.39,"110":6132.13},"2026-05-06":{"104":7356.35,"110":5658.77},"2026-05-07":{"104":7721.96,"110":5991.99},"2026-05-08":{"104":8131.25,"110":6033.51},"2026-05-09":{"104":8219.44,"110":6430.59},"2026-05-10":{"104":8233.10,"110":6047.14}};
var raw=[
  ["2026-05-01","104","350UNK",4,2137.3875,8549.55,["Bobbie Jackson III","Gabriel Silva Mane"]],
  ["2026-05-01","110","330UNK",4,1524.4525,6097.81,["Maurice Smith","Christian Lawson"]],
  ["2026-05-02","104","350UNK",4,1924.1350,7696.54,["Abubakarr Sessay","Christian Lawson"]],
  ["2026-05-02","110","330UNK",4,1436.8375,5747.35,["Bobbie Jackson III","Maurice Smith"]],
  ["2026-05-03","104","A350_2",4,2097.7375,8390.95,["Bobbie Jackson III","Claudette St. Juste"]],
  ["2026-05-03","110","330UNK",2,3139.6400,6279.28,["Gabriel Silva Mane"]],
  ["2026-05-04","104","A350_2",4,2075.2350,8300.94,["Claudette St. Juste","Abubakarr Sessay"]],
  ["2026-05-04","110","GVSXY",4,1599.1175,6396.47,["Bobbie Jackson III","Issa Camara"]],
  ["2026-05-05","104","A350_2",4,1913.0975,7652.39,["Claudette St. Juste","Abubakarr Sessay"]],
  ["2026-05-05","110","330UNK",2,3066.0650,6132.13,["Christian Lawson"]],
  ["2026-05-06","104","A350_2",1,3678.1750,3678.18,["Christian Lawson"]],
  ["2026-05-06","104","350UNK",1,3678.1750,3678.18,["Tecari Brown"]],
  ["2026-05-06","110","330UNK",1,2829.3850,2829.39,["Claudette St. Juste"]],
  ["2026-05-06","110","330UNK",1,2829.3850,2829.39,["Abdou Diakhate"]],
  ["2026-05-07","104","350UNK",1,3860.9800,3860.98,["Christian Lawson"]],
  ["2026-05-07","104","350UNK",1,3860.9800,3860.98,["Abdou Diakhate"]],
  ["2026-05-07","110","330UNK",1,2995.9950,2995.99,["Bobbie Jackson III"]],
  ["2026-05-07","110","330UNK",1,2995.9950,2995.99,["Abdou Diakhate"]],
  ["2026-05-08","104","350UNK",1,4065.6250,4065.63,["Gabriel Silva Mane"]],
  ["2026-05-08","104","350UNK",1,4065.6250,4065.63,["Maurice Smith"]],
  ["2026-05-08","110","GVSXY",1,3016.7550,3016.76,["Christian Lawson"]],
  ["2026-05-08","110","GVSXY",1,3016.7550,3016.76,["Bobbie Jackson III"]],
  ["2026-05-09","104","350UNK",1,4109.7200,4109.72,["Maurice Smith"]],
  ["2026-05-09","104","350UNK",1,4109.7200,4109.72,["Gabriel Silva Mane"]],
  ["2026-05-09","110","330UNK",1,3215.2950,3215.3,["Christian Lawson"]],
  ["2026-05-09","110","330UNK",1,3215.2950,3215.3,["Bobbie Jackson III"]],
  ["2026-05-10","104","350UNK",1,4116.5500,4116.55,["Gabriel Silva Mane"]],
  ["2026-05-10","104","350UNK",1,4116.5500,4116.55,["Rachel Lester"]],
  ["2026-05-10","110","330UNK",1,3023.5700,3023.57,["Claudette St. Juste"]],
  ["2026-05-10","110","330UNK",1,3023.5700,3023.57,["Maurice Smith"]]
];
function fmt(n){return "$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(s){return new Date(s+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
var data=raw.map(function(r){return{date:r[0],ob:r[1],asset:r[2],missions:r[3],cpm:r[4],total:r[5],leads:r[6]};});
var dates=[...new Set(data.map(function(r){return r.date;}))].sort();
dates.forEach(function(d){var o=document.createElement("option");o.value=d;o.textContent=fd(d);document.getElementById("fD").appendChild(o);});
var gt=Object.keys(fc).reduce(function(s,d){return s+(fc[d]["104"]||0)+(fc[d]["110"]||0);},0);
var tm=data.reduce(function(s,r){return s+r.missions;},0);
var leads=new Set();data.forEach(function(r){r.leads.forEach(function(l){leads.add(l);});});
document.getElementById("kpis").innerHTML=
  "<div class='kpi'><div class='label'>Total Food Cost</div><div class='value'>"+fmt(gt)+"</div><div class='delta'>May 1-10 - V104 + V110</div></div>"+
  "<div class='kpi'><div class='label'>Total Missions</div><div class='value'>"+tm+"</div><div class='delta'>Matched with Excel</div></div>"+
  "<div class='kpi'><div class='label'>Avg Cost / Mission</div><div class='value'>"+fmt(gt/tm)+"</div><div class='delta'>Split equally per day</div></div>"+
  "<div class='kpi'><div class='label'>Team Leads</div><div class='value'>"+leads.size+"</div><div class='delta'>Across V104 + V110</div></div>";
var cd=Object.keys(fc).sort();
new Chart(document.getElementById("chart"),{type:"bar",data:{labels:cd.map(function(d){return fd(d).replace(", 2026","");}),datasets:[{label:"V104 ATL-LHR",data:cd.map(function(d){return fc[d]["104"]||0;}),backgroundColor:"rgba(96,165,250,0.75)",borderRadius:4},{label:"V110 ATL-MAN",data:cd.map(function(d){return fc[d]["110"]||0;}),backgroundColor:"rgba(52,211,153,0.75)",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#94a3b8"}},tooltip:{callbacks:{label:function(c){return c.dataset.label+": "+fmt(c.raw);}}}},scales:{x:{ticks:{color:"#64748b"},grid:{color:"rgba(255,255,255,0.05)"}},y:{ticks:{color:"#64748b",callback:function(v){return "$"+v.toLocaleString();}},grid:{color:"rgba(255,255,255,0.05)"}}}}});
function render(){
  var flt=document.getElementById("fF").value,fdt=document.getElementById("fD").value;
  var rows=data.filter(function(r){return(!flt||r.ob===flt)&&(!fdt||r.date===fdt);});
  var h2="",tm2=0,tc=0;
  rows.forEach(function(r){
    var bc=r.ob==="110"?"v110":"";
    tm2+=r.missions;tc+=r.total;
    var chips=r.leads.map(function(l){return "<span class='chip'>"+l+"</span>";}).join("");
    h2+="<tr><td>"+fd(r.date)+"</td><td><span class='badge "+bc+"'>V"+r.ob+"</span></td><td class='dim'>"+r.asset+"</td><td><div class='leads'>"+chips+"</div></td><td class='c'><span class='mc'>"+r.missions+"</span></td><td class='r'>"+fmt(r.cpm)+"</td><td class='r cpm'>"+fmt(r.total)+"</td></tr>";
  });
  document.getElementById("tbody").innerHTML=h2;
  document.getElementById("info").textContent=rows.length+" rows";
  document.getElementById("fm").textContent=tm2;
  document.getElementById("fa").textContent=fmt(tc/tm2);
  document.getElementById("ft").textContent=fmt(tc);
}
render();
</script>
</body>
</html>
